<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QR Designer{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">QR Designer</a>
        <div class="nav-links">
            <a href="/" class="nav-link {% block nav_designer %}{% endblock %}">Designer</a>
            <a href="/layout" class="nav-link {% block nav_layout %}{% endblock %}">Print Layout</a>
            <a href="/docs" class="nav-link" target="_blank">API Docs</a>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
